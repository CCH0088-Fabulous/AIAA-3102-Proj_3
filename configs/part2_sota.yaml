phase:
  name: "part2_sota"
  slug: "part2"
  entrypoint: "src/part2_sota/pipeline_part2.py"
  outputs:
    masks_dir: "results/masks/part2"
    videos_dir: "results/videos/part2"
    visualizations_dir: "results/visualizations/part2"

models:
  segmentation:
    backend: "sam2"
    weights_dir: "models/sam2"
  inpainting:
    backend: "propainter"
    weights_dir: "models/ProPainter"

pipeline:
  input:
    sequence_key: "bmx-trees"
  mask_generation:
    backend: "sam2"
  postprocess:
    dilate_kernel_size: 0
    dilate_iterations: 1
    fill_holes: true
    min_component_area: 16
    temporal_window: 1
  inpainting:
    backend: "propainter"
  visualization:
    enabled: true
    overlay_alpha: 0.35
    save_object_overlays: true
    save_mask_overlays: true
    save_comparisons: true
  export:
    save_masks: true
    save_video: true

# Custom prompts for different sequences
prompts:
  bmx-trees:
    - frame_idx: 0
      obj_id: 1
      box: [100.0, 40.0, 380.0, 220.0]  # Person + bike
      points: [[240.0, 130.0]]  # Point inside the person+bike
      labels: [1]
  tennis:
    - frame_idx: 0
      obj_id: 1
      box: [130.0, 50.0, 300.0, 200.0]   # Person + racket as one object, expanded left to include racket face
      points: [[190.0, 120.0]]
      labels: [1]
    - frame_idx: 0
      obj_id: 2
      box: [180.0, 110.0, 210.0, 135.0]   #racket
      points: [[197.0, 123.0]]
      labels: [1]
    - frame_idx: 13
      obj_id: 3
      box: [240.0, 216.0, 258.0, 232.0] # Tennis ball (when it appears)
      points: [[249.0, 224.0]]
      labels: [1]
    - frame_idx: 0
      obj_id: 4
      box: [200.0, 160.0, 400.0, 180.0]   # Person shadow
      points: [[310.0, 170.0]]
      labels: [1]
