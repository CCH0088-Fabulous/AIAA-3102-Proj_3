# Shared configuration for dataset resolution, naming, and output conventions.
project:
  default_sequence: "bmx-trees"

naming:
  frame_file_pattern: "frame_{frame_index:04d}.png"
  mask_file_pattern: "frame_{frame_index:04d}.png"
  video_file_pattern: "{sequence_name}_{phase_slug}.mp4"
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"

formats:
  mask:
    encoding: "binary_png"
    dtype: "uint8"
    foreground_value: 255
    background_value: 0
  video:
    container: ".mp4"
    codec: "mp4v"
    fps: 30

paths:
  models_root: "models"
  results_root: "results"
  masks_root: "results/masks"
  videos_root: "results/videos"
  visualizations_root: "results/visualizations"
  metrics_root: "results/metrics"
  logs_root: "results/logs"

datasets:
  aliases:
    bmx_trees: "bmx-trees"
    bmx-trees: "bmx-trees"
    tennis: "tennis"
    davis: "davis"
  sequences:
    bmx-trees:
      frames_dir: "data/raw/bmx-trees/bmx-trees"
      reference_masks_dir: "data/raw/bmx-trees/bmx-trees_mask"
      output_name: "bmx-trees"
    tennis:
      frames_dir: "data/raw/tennis/tennis"
      reference_masks_dir: "data/raw/tennis/tennis_mask"
      output_name: "tennis"
  davis:
    root: "data/raw/davis/DAVIS"
    jpeg_root: "data/raw/davis/DAVIS/JPEGImages/480p"
    annotation_root: "data/raw/davis/DAVIS/Annotations/480p"